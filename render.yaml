services:
  - type: web
    name: shop-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shop-system-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: shop-system-db
    plan: free
