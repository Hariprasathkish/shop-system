<h2>Snacks Menu</h2>
<form method="post">
Name <input name="name" required>
Price <input type="number" step="0.01" name="price" required>
Stock <input type="number" name="stock" required>
<button>Add</button>
</form>

<hr>

<table border="1">
<tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th></tr>
{% for i in items %}
<tr>
<td>{{i[0]}}</td>
<td>{{i[1]}}</td>
<td>{{i[2]}}</td>
<td>{{i[3]}}</td>
</tr>
{% endfor %}
</table>

<a href="/admin">Back</a>
