{% extends "base.html" %}

{% block title %}Admin Account Options{% endblock %}

{% block content %}
<div style="text-align: center; margin-bottom: 3rem; animation: fadeIn 0.8s ease-out;">
    <h1 style="font-size: 2.5rem; background: linear-gradient(90deg, var(--primary), #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Account Options</h1>
    <p class="text-muted">Manage your admin profile settings</p>
</div>

<div class="card" style="max-width: 500px; margin: 0 auto;">

    <form method="POST" action="/admin/account" style="margin-top: 2rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ admin[1] }}" disabled style="background-color: #f0f0f0;">
            <small class="text-muted">Username cannot be changed.</small>
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ admin[3] }}" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Leave blank to keep current">
            <small class="text-muted">Enter a new password or leave blank to keep the current one.</small>
        </div>

        <div class="mt-5 text-center" style="margin-top: 3rem; border-top: 1px solid #f1f5f9; pt: 2rem;">
            <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem; border-radius: 0.75rem; font-weight: 800;">
                <i class="fas fa-save mr-2"></i> Update Settings
            </button>
            <div style="margin-top: 1.5rem;">
                <a href="/admin" class="btn btn-secondary" style="background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; font-weight: 700; border-radius: 0.75rem; padding: 0.5rem 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-arrow-left"></i> Cancel & Return
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
